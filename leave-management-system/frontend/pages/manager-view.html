<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager – LeaveMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);background-attachment:fixed;}
  .comment-box{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 14px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;width:100%;outline:none;resize:none;}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">⚡ LeaveMS</div>
    <div class="sidebar-user"><div class="user-avatar" id="avatarLetter">M</div><div class="user-info"><div class="name" id="sidebarName">Manager</div><div class="role">manager</div></div></div>
    <nav>
      <div class="nav-section">Manager</div>
      <a href="manager-view.html" class="active"><span class="icon">⏳</span> Pending Requests</a>
      <a href="calendar.html"><span class="icon">📅</span> Team Calendar</a>
      <div class="nav-section">Account</div>
      <a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a>
    </nav>
  </div>
  <div class="main-content">
    <div class="topbar"><div><div class="page-title">Leave Requests</div><div class="page-subtitle">Review and manage team leave requests</div></div></div>
    <div id="alert" class="alert"></div>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('pending')">⏳ Pending</button>
      <button class="tab-btn" onclick="switchTab('all')">📋 All Requests</button>
    </div>
    <div id="tab-pending" class="tab-content active">
      <div class="card">
        <h2>⏳ Pending Approvals</h2>
        <div class="table-wrapper"><table>
          <thead><tr><th>Employee</th><th>Dept</th><th>Type</th><th>Duration</th><th>Days</th><th>Reason</th><th>Actions</th></tr></thead>
          <tbody id="pendingTable"></tbody>
        </table></div>
      </div>
    </div>
    <div id="tab-all" class="tab-content">
      <div class="card">
        <h2>📋 All Leave Requests</h2>
        <div class="table-wrapper"><table>
          <thead><tr><th>Employee</th><th>Type</th><th>Duration</th><th>Days</th><th>Status</th><th>Comment</th></tr></thead>
          <tbody id="allTable"></tbody>
        </table></div>
      </div>
    </div>
  </div>

  <!-- Approve/Reject Modal -->
  <div class="modal-overlay" id="decideModal">
    <div class="modal">
      <h3 id="modalTitle">Approve Leave</h3>
      <p style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:20px;" id="modalInfo"></p>
      <div class="form-group"><label>Comment (Optional)</label><textarea class="comment-box" id="modalComment" rows="3" placeholder="Add a comment..."></textarea></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn" id="modalBtn" onclick="submitDecision()">Confirm</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script><script src="../js/auth.js"></script>
  <script>
    let currentLeaveId, currentStatus;
    document.addEventListener('DOMContentLoaded', async () => {
      const user = checkAuth();
      if(!user||!['manager','admin'].includes(user.role)){window.location.href='/pages/login.html';return;}
      document.getElementById('sidebarName').textContent = user.name;
      document.getElementById('avatarLetter').textContent = user.name.charAt(0).toUpperCase();
      loadData();
    });
    const loadData = async () => {
      try {
        const [pending, all] = await Promise.all([api.get('/manager/pending'), api.get('/manager/all')]);
        const approved = all.filter(l=>l.status==='approved').length;
        const rejected = all.filter(l=>l.status==='rejected').length;
        document.getElementById('statsGrid').innerHTML = `
          <div class="stat-card"><div class="stat-icon">⏳</div><div class="stat-number">${pending.length}</div><div class="stat-label">Pending</div></div>
          <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>
          <div class="stat-card"><div class="stat-icon">❌</div><div class="stat-number">${rejected}</div><div class="stat-label">Rejected</div></div>
          <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-number">${all.length}</div><div class="stat-label">Total</div></div>`;
        document.getElementById('pendingTable').innerHTML = pending.map(l=>`
          <tr>
            <td><strong>${l.employee_name}</strong></td><td>${l.department||'–'}</td><td>${l.leave_type_name}</td>
            <td>${formatDate(l.start_date)} – ${formatDate(l.end_date)}</td><td>${l.days}</td><td>${l.reason||'–'}</td>
            <td style="display:flex;gap:8px;">
              <button class="btn btn-success btn-sm" onclick="openModal(${l.id},'approved','${l.employee_name}',${l.days})">✅ Approve</button>
              <button class="btn btn-danger btn-sm" onclick="openModal(${l.id},'rejected','${l.employee_name}',${l.days})">❌ Reject</button>
            </td>
          </tr>`).join('') || '<tr><td colspan="7"><div class="empty-state"><div class="icon">🎉</div><p>No pending requests!</p></div></td></tr>';
        document.getElementById('allTable').innerHTML = all.map(l=>`
          <tr><td>${l.employee_name}</td><td>${l.leave_type_name}</td><td>${formatDate(l.start_date)} – ${formatDate(l.end_date)}</td><td>${l.days}</td><td>${statusBadge(l.status)}</td><td>${l.manager_comment||'–'}</td></tr>`).join('');
      } catch(err){showAlert(err.message,'error');}
    };
    const openModal = (id, status, name, days) => {
      currentLeaveId=id; currentStatus=status;
      document.getElementById('modalTitle').textContent = status==='approved'?'✅ Approve Leave':'❌ Reject Leave';
      document.getElementById('modalInfo').textContent = `${name} – ${days} day(s)`;
      document.getElementById('modalBtn').className = `btn ${status==='approved'?'btn-success':'btn-danger'}`;
      document.getElementById('modalBtn').textContent = status==='approved'?'Approve':'Reject';
      document.getElementById('decideModal').classList.add('open');
    };
    const closeModal = () => { document.getElementById('decideModal').classList.remove('open'); document.getElementById('modalComment').value=''; };
    const submitDecision = async () => {
      try {
        await api.put(`/manager/status/${currentLeaveId}`,{status:currentStatus,comment:document.getElementById('modalComment').value});
        showAlert(`Leave ${currentStatus} successfully!`,'success'); closeModal(); loadData();
      } catch(err){showAlert(err.message,'error');}
    };
    const switchTab = (name) => {
      document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tab-'+name).classList.add('active');
      event.target.classList.add('active');
    };
  </script>
</body>
</html>
