<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LeaveMS – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
    .bg{position:fixed;inset:0;z-index:0;}
    .bg-circle{position:absolute;border-radius:50%;filter:blur(80px);animation:float 6s ease-in-out infinite;}
    .bg-circle:nth-child(1){width:400px;height:400px;background:rgba(102,126,234,0.3);top:-100px;left:-100px;}
    .bg-circle:nth-child(2){width:300px;height:300px;background:rgba(118,75,162,0.3);bottom:-80px;right:-80px;animation-delay:3s;}
    .bg-circle:nth-child(3){width:200px;height:200px;background:rgba(102,126,234,0.2);top:50%;left:50%;animation-delay:1.5s;}
    @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
    @keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
    @keyframes neonPulse{0%,100%{box-shadow:0 0 5px #667eea,0 0 10px #667eea;}50%{box-shadow:0 0 15px #667eea,0 0 30px #667eea,0 0 60px #667eea;}}
    @keyframes spin{to{transform:rotate(360deg);}}
    .container{position:relative;z-index:1;width:100%;max-width:440px;padding:20px;}
    .logo{text-align:center;margin-bottom:32px;animation:fadeInUp 0.5s ease;}
    .logo h1{font-size:32px;font-weight:700;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo p{font-size:13px;color:rgba(255,255,255,0.5);margin-top:6px;}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:36px;backdrop-filter:blur(20px);animation:fadeInUp 0.6s ease;}
    .tabs{display:flex;background:rgba(255,255,255,0.05);border-radius:12px;padding:4px;margin-bottom:28px;}
    .tab{flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.5);font-size:14px;font-weight:500;cursor:pointer;border-radius:8px;transition:all 0.3s;font-family:'Poppins',sans-serif;}
    .tab.active{background:linear-gradient(135deg,#667eea,#764ba2);color:white;box-shadow:0 4px 15px rgba(102,126,234,0.4);}
    .form{display:none;animation:fadeInUp 0.3s ease;}
    .form.active{display:block;}
    .form-group{margin-bottom:18px;}
    .form-group label{display:block;font-size:12px;font-weight:500;color:rgba(255,255,255,0.6);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
    .form-group input,.form-group select{width:100%;padding:13px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:14px;font-family:'Poppins',sans-serif;outline:none;transition:all 0.3s;}
    .form-group input:focus,.form-group select:focus{border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,0.2);}
    .form-group select option{background:#16213e;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:'Poppins',sans-serif;transition:all 0.3s;margin-top:8px;position:relative;overflow:hidden;}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(102,126,234,0.5);}
    .btn:active{transform:scale(0.98);}
    .btn.loading{pointer-events:none;opacity:0.7;}
    .alert{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;align-items:center;gap:8px;}
    .alert.show{display:flex;}
    .alert-error{background:rgba(235,51,73,0.15);border:1px solid rgba(235,51,73,0.3);color:#f45c43;}
    .alert-success{background:rgba(17,153,142,0.15);border:1px solid rgba(17,153,142,0.3);color:#38ef7d;}
    .divider{text-align:center;color:rgba(255,255,255,0.3);font-size:12px;margin:16px 0;position:relative;}
    .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(255,255,255,0.1);}
    .divider::before{left:0;} .divider::after{right:0;}
    .demo-accounts{background:rgba(102,126,234,0.1);border:1px solid rgba(102,126,234,0.2);border-radius:12px;padding:16px;margin-top:16px;}
    .demo-accounts h4{font-size:11px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
    .demo-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:12px;}
    .demo-item:last-child{border:none;}
    .demo-role{background:rgba(102,126,234,0.2);color:#667eea;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}
    .demo-btn{background:none;border:1px solid rgba(102,126,234,0.3);color:#667eea;padding:3px 10px;border-radius:6px;font-size:11px;cursor:pointer;transition:all 0.2s;font-family:'Poppins',sans-serif;}
    .demo-btn:hover{background:rgba(102,126,234,0.2);}
  </style>
</head>
<body>
  <div class="bg">
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
    <div class="bg-circle"></div>
  </div>
  <div class="container">
    <div class="logo">
      <h1>⚡ LeaveMS</h1>
      <p>Leave Management System</p>
    </div>
    <div class="card">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab" onclick="switchTab('register')">Register</button>
      </div>

      <div id="alert" class="alert"></div>

      <!-- LOGIN FORM -->
      <div class="form active" id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@company.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn" onclick="doLogin()">Sign In →</button>
        <div class="divider">Demo Accounts</div>
        <div class="demo-accounts">
          <h4>Quick Login</h4>
          <div class="demo-item">
            <span>admin@company.com</span>
            <span class="demo-role">Admin</span>
            <button class="demo-btn" onclick="fillLogin('admin@company.com','password')">Use</button>
          </div>
          <div class="demo-item">
            <span>manager@company.com</span>
            <span class="demo-role">Manager</span>
            <button class="demo-btn" onclick="fillLogin('manager@company.com','password')">Use</button>
          </div>
          <div class="demo-item">
            <span>employee@company.com</span>
            <span class="demo-role">Employee</span>
            <button class="demo-btn" onclick="fillLogin('employee@company.com','password')">Use</button>
          </div>
        </div>
      </div>

      <!-- REGISTER FORM -->
      <div class="form" id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="regName" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" id="regDept" placeholder="Engineering">
          </div>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="you@company.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters">
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="regRole">
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <button class="btn" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>

  <script>
    const API = '/api';
    const getToken = () => localStorage.getItem('token');

    const showAlert = (msg, type='error') => {
      const el = document.getElementById('alert');
      el.className = `alert alert-${type} show`;
      el.innerHTML = (type==='error'?'⚠️':'✅') + ' ' + msg;
      setTimeout(()=>el.classList.remove('show'), 4000);
    };

    const switchTab = (tab) => {
      document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('loginForm').classList.toggle('active', tab==='login');
      document.getElementById('registerForm').classList.toggle('active', tab==='register');
    };

    const fillLogin = (email, pass) => {
      document.getElementById('loginEmail').value = email;
      document.getElementById('loginPassword').value = pass;
    };

    const redirectByRole = (role) => {
      if(role==='admin') window.location.href='/pages/admin-panel.html';
      else if(role==='manager') window.location.href='/pages/manager-view.html';
      else window.location.href='/pages/dashboard.html';
    };

    const doLogin = async () => {
      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;
      if(!email||!password) return showAlert('Please fill all fields');
      try {
        const res = await fetch(`${API}/auth/login`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
        const data = await res.json();
        if(!res.ok) return showAlert(data.message);
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        showAlert('Login successful! Redirecting...', 'success');
        setTimeout(()=>redirectByRole(data.user.role), 800);
      } catch(err) { showAlert('Connection error. Is server running?'); }
    };

    const doRegister = async () => {
      const name = document.getElementById('regName').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPassword').value;
      const role = document.getElementById('regRole').value;
      const department = document.getElementById('regDept').value;
      if(!name||!email||!password) return showAlert('Please fill all required fields');
      try {
        const res = await fetch(`${API}/auth/register`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,role,department})});
        const data = await res.json();
        if(!res.ok) return showAlert(data.message);
        showAlert('Account created! Please sign in.', 'success');
        setTimeout(()=>switchTab('login'), 1500);
      } catch(err) { showAlert('Connection error'); }
    };

    document.addEventListener('keydown', e => { if(e.key==='Enter') { if(document.getElementById('loginForm').classList.contains('active')) doLogin(); else doRegister(); }});
  </script>
</body>
</html>
