<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar – LeaveMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    body{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);background-attachment:fixed;}
    .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .cal-month{font-size:20px;font-weight:700;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
    .cal-label{text-align:center;font-size:11px;font-weight:600;color:rgba(255,255,255,0.4);padding:10px 0;text-transform:uppercase;letter-spacing:1px;}
    .cal-day{text-align:center;padding:12px 6px;border-radius:10px;font-size:13px;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);transition:all 0.2s;cursor:default;}
    .cal-day:hover{background:rgba(102,126,234,0.1);}
    .cal-day.today{background:linear-gradient(135deg,rgba(102,126,234,0.3),rgba(118,75,162,0.3));border-color:rgba(102,126,234,0.5);font-weight:700;box-shadow:0 0 15px rgba(102,126,234,0.3);}
    .cal-day.on-leave{background:rgba(17,153,142,0.2);border-color:rgba(17,153,142,0.4);}
    .cal-day.weekend{opacity:0.4;}
    .cal-day .day-num{font-size:14px;font-weight:600;}
    .cal-day .leave-dot{width:6px;height:6px;border-radius:50%;background:#38ef7d;margin-top:4px;}
    .legend{display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;}
    .legend-item{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,0.5);}
    .legend-dot{width:12px;height:12px;border-radius:4px;}
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">⚡ LeaveMS</div>
    <div class="sidebar-user"><div class="user-avatar" id="avatarLetter">U</div><div class="user-info"><div class="name" id="sidebarName">User</div><div class="role" id="sidebarRole">employee</div></div></div>
    <nav>
      <div class="nav-section">Main</div>
      <a href="dashboard.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="apply-leave.html"><span class="icon">📝</span> Apply Leave</a>
      <a href="leave-history.html"><span class="icon">📋</span> My Leaves</a>
      <a href="calendar.html" class="active"><span class="icon">📅</span> Calendar</a>
      <div class="nav-section">Account</div>
      <a href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a>
    </nav>
  </div>
  <div class="main-content">
    <div class="topbar"><div><div class="page-title">Team Leave Calendar</div><div class="page-subtitle">View team availability at a glance</div></div></div>
    <div class="card">
      <div class="cal-header">
        <button class="btn btn-secondary btn-sm" onclick="prevMonth()">← Prev</button>
        <div class="cal-month" id="monthYear"></div>
        <button class="btn btn-secondary btn-sm" onclick="nextMonth()">Next →</button>
      </div>
      <div class="cal-grid">
        <div class="cal-label">Sun</div><div class="cal-label">Mon</div><div class="cal-label">Tue</div>
        <div class="cal-label">Wed</div><div class="cal-label">Thu</div><div class="cal-label">Fri</div><div class="cal-label">Sat</div>
      </div>
      <div id="calendarGrid" class="cal-grid" style="margin-top:8px;"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(102,126,234,0.5)"></div>Today</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(17,153,142,0.4)"></div>On Leave</div>
        <div class="legend-item"><div class="legend-dot" style="background:rgba(255,255,255,0.05)"></div>Available</div>
      </div>
    </div>
    <div class="card" id="leaveListCard">
      <h2>📋 This Month's Leaves</h2>
      <div id="monthLeaveList"></div>
    </div>
  </div>
  <script src="../js/api.js"></script><script src="../js/auth.js"></script>
  <script>
    let currentDate = new Date(), allLeaves = [];
    document.addEventListener('DOMContentLoaded', async () => {
      const user = checkAuth(); if(!user) return;
      document.getElementById('sidebarName').textContent = user.name;
      document.getElementById('sidebarRole').textContent = user.role;
      document.getElementById('avatarLetter').textContent = user.name.charAt(0).toUpperCase();
      try {
        try { allLeaves = await api.get('/manager/all'); } catch(e) { allLeaves = await api.get('/leave/my-leaves'); }
        renderCalendar();
      } catch(err){}
    });
    const renderCalendar = () => {
      const year = currentDate.getFullYear(), month = currentDate.getMonth();
      document.getElementById('monthYear').textContent = new Date(year,month).toLocaleString('default',{month:'long',year:'numeric'});
      const firstDay = new Date(year,month,1).getDay(), daysInMonth = new Date(year,month+1,0).getDate();
      let html = '';
      for(let i=0;i<firstDay;i++) html+='<div></div>';
      for(let d=1;d<=daysInMonth;d++){
        const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const isToday=new Date().toDateString()===new Date(year,month,d).toDateString();
        const dayOfWeek=new Date(year,month,d).getDay();
        const isWeekend=dayOfWeek===0||dayOfWeek===6;
        const leavesOnDay=allLeaves.filter(l=>l.status==='approved'&&dateStr>=l.start_date.split('T')[0]&&dateStr<=l.end_date.split('T')[0]);
        const onLeave=leavesOnDay.length>0;
        html+=`<div class="cal-day${isToday?' today':''}${onLeave?' on-leave':''}${isWeekend?' weekend':''}" title="${onLeave?leavesOnDay.map(l=>l.employee_name||'On leave').join(', '):''}">
          <div class="day-num">${d}</div>${onLeave?'<div class="leave-dot"></div>':''}
        </div>`;
      }
      document.getElementById('calendarGrid').innerHTML = html;
      const monthLeaves = allLeaves.filter(l=>l.status==='approved'&&(new Date(l.start_date).getMonth()===month||new Date(l.end_date).getMonth()===month));
      document.getElementById('monthLeaveList').innerHTML = monthLeaves.length ? monthLeaves.map(l=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05);">
          <div><div style="font-size:14px;font-weight:500;">${l.employee_name||'You'}</div><div style="font-size:12px;color:rgba(255,255,255,0.4);">${l.leave_type_name}</div></div>
          <div style="text-align:right;"><div style="font-size:12px;color:#667eea;">${formatDate(l.start_date)} – ${formatDate(l.end_date)}</div><div style="font-size:11px;color:rgba(255,255,255,0.4);">${l.days} days</div></div>
        </div>`).join('') : '<div class="empty-state"><div class="icon">🎉</div><p>No approved leaves this month</p></div>';
    };
    const prevMonth = () => { currentDate.setMonth(currentDate.getMonth()-1); renderCalendar(); };
    const nextMonth = () => { currentDate.setMonth(currentDate.getMonth()+1); renderCalendar(); };
  </script>
</body>
</html>
